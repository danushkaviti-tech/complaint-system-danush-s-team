{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account | GVMC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --secondary: #06b6d4; --dark: #020617; }
    body { background-color: var(--dark); font-family: 'Outfit', sans-serif; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; }
    .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(at 50% 50%, rgba(244,63,94,0.08) 0px, transparent 60%); }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(244,63,94,0.2); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 460px; text-align: center; }
    .danger-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(244,63,94,0.1); border: 2px solid rgba(244,63,94,0.3); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #f43f5e; margin: 0 auto 24px; }
    .btn-danger-solid { background: linear-gradient(135deg, #f43f5e, #e11d48); color: white; border: none; padding: 12px 32px; border-radius: 12px; font-weight: 600; transition: 0.3s; }
    .btn-danger-solid:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,63,94,0.4); color: white; }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 12px 32px; border-radius: 12px; font-weight: 500; transition: 0.3s; text-decoration: none; display: inline-block; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #f8fafc; }
  </style>
</head>
<body>
<div class="mesh-bg"></div>
<div class="container d-flex justify-content-center py-5">
  <div class="glass-card">
    <div class="danger-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h4 class="fw-bold text-white mb-2">Delete Your Account?</h4>
    <p class="text-muted mb-1">You are about to permanently delete:</p>
    <p class="fw-bold" style="color:#fb7185;">{{ user.username }} ({{ user.email }})</p>
    <p class="text-muted small mb-4">All your data, complaints, and profile information will be erased. <strong class="text-white">This cannot be undone.</strong></p>
    <div class="d-flex justify-content-center gap-3">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger-solid"><i class="fa-solid fa-trash me-2"></i>Yes, Delete</button>
      </form>
      <a href="{% url 'users:profile' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
